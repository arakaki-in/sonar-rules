name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, Test and Benchmark (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python versions
        run: |
          uv python install 3.10 3.11 3.12 3.13

      - name: Verify Java code formatting
        run: mvn spotless:check -B

      - name: Run unit tests and benchmarks
        run: mvn clean test -B

      - name: Run security audit
        run: mvn verify -Psecurity-audit -DskipTests -B
