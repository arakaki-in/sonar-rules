name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: mvn clean test -B

      - name: Run Integration Tests
        run: mvn verify -Pintegration-tests -B

  publish:
    name: Package and Publish Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/v')"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github

      - name: Set Release Version from Git Tag
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "Setting version to: $TAG_VERSION"
          mvn versions:set -DnewVersion="$TAG_VERSION" -DgenerateBackupPoms=false -B

      - name: Build Release Artifacts
        run: mvn clean package -Prelease -DskipTests -B

      - name: Upload to GitHub Packages
        run: mvn deploy -Prelease -DskipTests -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/arakakiin-rules-plugin-*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
