name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-jdk21:
    name: Build and Test (JDK 21)
    uses: ./.github/workflows/_build.yml
    with:
      java-version: '21'
      run-benchmarks: true
      run-security-audit: true

  build-jdk23:
    name: Build and Test (JDK 23)
    uses: ./.github/workflows/_build.yml
    with:
      java-version: '23'
      run-benchmarks: false
      run-security-audit: false

  publish:
    name: Publish Release
    needs: [build-jdk21, build-jdk23]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Determine if version bump is needed
        id: check_bump
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run version bump script
        id: bump
        if: steps.check_bump.outputs.should_bump == 'true'
        run: |
          ./.github/scripts/bump-version.sh

      - name: Commit, Tag, and Push Version Bump
        if: steps.check_bump.outputs.should_bump == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add pom.xml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"

          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Get Release Tag Name
        id: release_tag
        run: |
          if [ "${{ steps.check_bump.outputs.should_bump }}" = "true" ]; then
            echo "tag_name=v${{ steps.bump.outputs.new_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Packages
        run: mvn clean deploy -DskipTests -B -Prelease

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Sign JAR
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.PASSPHRASE }}" \
            --detach-sign -a target/arakakiin-rules-plugin-*.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          files: |
            target/arakakiin-rules-plugin-*.jar
            target/arakakiin-rules-plugin-*.jar.asc
            target/bom.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
